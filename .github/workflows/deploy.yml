name: Deploy to cPanel

on:
  push:
    branches:
      - main # Workflow akan berjalan setiap kali kamu push ke branch main

# Memaksa runner GitHub menggunakan Node.js 24 agar aman dari error deprecation
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. MEMBUAT FILE .ENV DARI GITHUB SECRETS
    # Langkah ini akan mengambil seluruh isi ENV_PRODUCTION yang kamu buat di GitHub Secrets 
    # dan mengubahnya menjadi file .env nyata di dalam server virtual GitHub sebelum dideploy.
    - name: Create .env file
      run: |
        echo "${{ secrets.ENV_PRODUCTION }}" > .env

    # 2. SETUP SSH AGENT DENGAN PASSPHRASE
    - name: Setup SSH Agent
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      env:
        SSH_PASSPHRASE: ${{ secrets.SSH_PASSPHRASE }}

    # 3. SCAN SSH KEY CPANEL
    # Mengonfirmasi identitas server cPanel agar proses transfer tidak terhenti di tengah jalan.
    - name: Scan Remote Host SSH Key
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -p 22 ${{ secrets.REMOTE_HOST }} >> ~/.ssh/known_hosts
        # Catatan: Ganti "-p 22" jika cPanel kamu menggunakan port SSH custom (misal: -p 2222)

    # 4. PROSES DEPLOYMENT VIA RSYNC
    # File .env yang dibuat pada langkah pertama otomatis akan ikut terupload ke cPanel.
    - name: Deploy files via rsync
      run: |
        rsync -rlgoDzvO --delete \
          -e "ssh -p 22" \
          --exclude '/.git/' \
          --exclude '/.github/' \
          --exclude '/node_modules/' \
          ./ ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}:/home/sublymyi/capstone/sipangan-backend/
        
        # PENTING: 
        # 1. Ganti "-p 22" jika port SSH cPanel kamu custom.
        # 2. Ganti "/home/username_cpanel/public_html/" sesuai dengan path asli folder website kamu di cPanel.

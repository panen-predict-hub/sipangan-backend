name: Deploy to cPanel

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. MEMBUAT FILE .ENV DARI GITHUB SECRETS
    - name: Create .env file
      run: |
        echo "${{ secrets.ENV_PRODUCTION }}" > .env

    # 2. PROSES DEPLOYMENT VIA SCP (Pengganti rsync)
    - name: Deploy files via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22 # Ganti jika cPanel kamu menggunakan port SSH custom
        source: ",!.git/,!.github/,!node_modules/" # Mengupload semua file kecuali folder ini
        target: "/home/username_cpanel/capstone/sipangan-backend/" # Sesuaikan path sipangan-backend kamu di sini
        clean: false # Set ke true jika ingin menghapus semua file lama di cPanel sebelum upload (hati-hati!)

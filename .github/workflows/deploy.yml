name: Deploy to cPanel

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. MEMBUAT FILE .ENV DARI GITHUB SECRETS
    - name: Create .env file
      run: |
        echo "${{ secrets.ENV_PRODUCTION }}" > .env

    # 2. SETUP SSH KEY UNTUK NATIVE SFTP
    - name: Setup SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -p 22 ${{ secrets.REMOTE_HOST }} >> ~/.ssh/known_hosts

    # 3. PROSES DEPLOYMENT VIA NATIVE SFTP
    # Menggunakan LFTP/SFTP bawaan Linux yang jauh lebih bersahabat dengan firewall hosting
    - name: Deploy files via SFTP
      run: |
        sudo apt-get update && sudo apt-get install -y lftp
        lftp -e "set sftp:connect-program 'ssh -a -x -i ~/.ssh/id_rsa'; connect sftp://${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}:22; mirror -R --delete --exclude .git/ --exclude .github/ ./ /home/sublymyi/capstone/sipangan-backend/; quit"
        
        # PENTING: 
        # 1. Ganti port "22" di atas jika port SSH cPanel kamu custom.
        # 2. Ganti "/home/username_cpanel/capstone/sipangan-backend/" dengan path aslimu.

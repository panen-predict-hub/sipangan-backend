name: Deploy to cPanel

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. MEMBUAT FILE .ENV DARI GITHUB SECRETS
    - name: Create .env file
      run: |
        echo "${{ secrets.ENV_PRODUCTION }}" > .env

    # 2. SETUP SSH KEY (Kini jauh lebih bersih karena tanpa passphrase)
    - name: Setup SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

    # 3. SCAN SSH KEY CPANEL
    - name: Scan Remote Host SSH Key
      run: |
        ssh-keyscan -p 22 ${{ secrets.REMOTE_HOST }} >> ~/.ssh/known_hosts

    # 4. PROSES DEPLOYMENT VIA RSYNC
    - name: Deploy files via rsync
      run: |
        rsync -rlgoDzvO --delete \
          -e "ssh -p 22 -i ~/.ssh/id_rsa" \
          --exclude '/.git/' \
          --exclude '/.github/' \
          --exclude '/node_modules/' \
          ./ ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}:/home/sublymyi/capstone/sipangan-backend/

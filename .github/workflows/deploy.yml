name: Deploy to cPanel

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. MEMBUAT FILE .ENV DARI GITHUB SECRETS
    - name: Create .env file
      run: |
        echo "${{ secrets.ENV_PRODUCTION }}" > .env

    # 2. SETUP SSH KEY & KNOWN HOSTS
    - name: Setup SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -p 22 ${{ secrets.REMOTE_HOST }} >> ~/.ssh/known_hosts

    # 3. PROSES DEPLOYMENT VIA NATIVE SFTP (BATCH MODE)
    # Langkah ini murni menggunakan perintah sftp bawaan Linux.
    # Kita menggunakan opsi -b (batch mode) agar sftp berjalan otomatis tanpa meminta prompt interaktif.
    # Perintah 'put -r' akan mengupload seluruh file dan folder secara rekursif ke cPanel.
    - name: Deploy files via Native SFTP
      run: |
        # Membuat file instruksi untuk sftp
        cat <<EOF > sftp_batch.txt
        progress
        cd /home/sublymyi/capstone/sipangan-backend
        put -r ./*
        bye
        EOF
        
        # Mengeksekusi sftp secara non-interaktif menggunakan Private Key
        sftp -b sftp_batch.txt -P 22 -i ~/.ssh/id_rsa ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}
        
        # Membersihkan file batch setelah selesai
        rm sftp_batch.txt

name: Deploy to cPanel

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. MEMBUAT FILE .ENV DARI GITHUB SECRETS
    # (Pastikan kamu sudah memasukkan isi .env ke GitHub Secret bernama ENV_PRODUCTION)
    - name: Create .env file
      run: |
        echo "${{ secrets.ENV_PRODUCTION }}" > .env

    # 2. INSTALL SSHPASS & SETUP SSH AGENT NATIVE
    # Perbaikan utama: Menggunakan perintah linux murni untuk memasukkan passphrase secara otomatis
    - name: Setup SSH with Passphrase
      run: |
        sudo apt-get update && sudo apt-get install -y sshpass
        mkdir -p ~/.ssh
        
        # Buat file private key dari secret
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        
        # Jalankan ssh-agent dan masukkan key + passphrase menggunakan sshpass
        eval $(ssh-agent -s)
        echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
        echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV
        
        # Menyuapi passphrase ke prompt ssh-add tanpa interaksi manual
        sshpass -p "${{ secrets.SSH_PASSPHRASE }}" ssh-add ~/.ssh/id_rsa

    # 3. SCAN SSH KEY CPANEL
    - name: Scan Remote Host SSH Key
      run: |
        ssh-keyscan -p 22 ${{ secrets.REMOTE_HOST }} >> ~/.ssh/known_hosts
        # Catatan: Ganti "-p 22" jika cPanel kamu menggunakan port SSH custom (misal: -p 2222)

    # 4. PROSES DEPLOYMENT VIA RSYNC
    - name: Deploy files via rsync
      run: |
        rsync -rlgoDzvO --delete \
          -e "ssh -p 22" \
          --exclude '/.git/' \
          --exclude '/.github/' \
          --exclude '/node_modules/' \
          ./ ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}:/home/sublymyi/capstone/sipangan-backend/
        
        # PENTING: 
        # 1. Ganti "-p 22" jika port SSH cPanel kamu custom.
        # 2. Ganti "/home/username_cpanel/public_html/" sesuai dengan path asli folder website kamu di cPanel.
